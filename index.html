<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>line - Realtime Archiving</title>

  <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Kirang+Haerang&family=Diphylleia&family=Hahmlet&family=Gowun+Dodum&family=Noto+Serif+KR&display=swap" rel="stylesheet">

  <style>
    /* ... (기존 @font-face 설정들 생략) ... */
    
    @font-face {
      font-family: 'SchoolSafeUniverse';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2307-2@1.0/HakgyoansimWoojuR.woff2') format('woff2');
      font-weight: normal; font-style: normal; font-display: swap;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #fffafc;
    }
    canvas {
      display: block;
    }

    /* 상단에 현재 기록 상태만 살짝 표시 (디버깅용, 필요 없으면 display:none 처리 가능) */
    #status-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      font-family: 'SchoolSafeUniverse', sans-serif;
      font-size: 11px;
      color: rgba(0,0,0,0.3);
      pointer-events: none; /* 클릭 방해 금지 */
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/addons/p5.sound.min.js"></script>
</head>

<body>
  <div id="status-indicator">System Active</div>

  <script src="sketch.js"></script>

  <script>
    // 1. 본인의 Google Apps Script 웹 앱 URL을 입력하세요.
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw53lb7jMqy2IznctKcl567uqPyLUsqr9aaovBW49jwA9yeBN3-KLqUdJvgXuwyVcnjTg/exec"; 

    const statusIndicator = document.getElementById('status-indicator');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      console.error("이 브라우저는 음성 인식을 지원하지 않습니다.");
    } else {
      const recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';
      recognition.continuous = true;   // 연속 인식 활성화
      recognition.interimResults = false; // 최종 결과만 전송

      // 인식 시작 시 상태 표시
      recognition.onstart = () => {
        console.log("Voice recording started...");
        statusIndicator.innerText = "REC ●";
      };

      // 인식 결과 발생 시 처리
      recognition.onresult = (event) => {
        const lastResult = event.results[event.results.length - 1];
        if (lastResult.isFinal) {
          const text = lastResult[0].transcript.trim();
          const timestamp = new Date().toLocaleString('ko-KR');

          if (text.length > 0) {
            console.log(`Archiving: [${timestamp}] ${text}`);
            
            // 스프레드시트로 전송 (Background)
            fetch(GAS_URL, {
              method: "POST",
              mode: "no-cors", 
              body: JSON.stringify({ timestamp, text }),
              headers: { "Content-Type": "application/json" }
            }).catch(err => console.error("GAS Sync Error:", err));
          }
        }
      };

      // 💡 핵심: 음성 인식이 끊겼을 때 자동으로 다시 시작 (무한 루프)
      recognition.onend = () => {
        console.log("Restarting recognition...");
        recognition.start(); 
      };

      // 에러 발생 시 처리
      recognition.onerror = (event) => {
        console.error("Recognition Error:", event.error);
        if (event.error === 'not-allowed') {
          statusIndicator.innerText = "마이크 권한 필요";
        }
      };

      // 2. 페이지 로드와 동시에 즉시 시작
      // 브라우저 정책상 첫 클릭이 있어야 마이크가 작동할 수 있으므로, 
      // 화면 아무 곳이나 한 번 클릭하면 시작되도록 안전장치를 둡니다.
      window.addEventListener('load', () => {
        recognition.start();
      });

      // 브라우저의 '사용자 동작 후 오디오 시작' 정책 대응
      document.body.addEventListener('click', () => {
        recognition.start();
        console.log("Recognition resumed by user interaction.");
      }, { once: true });
    }
  </script>
</body>
</html>
