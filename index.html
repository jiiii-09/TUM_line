<body>
  <div id="status-indicator">System Active</div>

  <script src="sketch.js"></script>

  <script>
    // 1. 본인의 Google Apps Script 웹 앱 URL을 입력하세요.
  const GAS_URL = "https://script.google.com/macros/s/AKfycbw53lb7jMqy2IznctKcl567uqPyLUsqr9aaovBW49jwA9yeBN3-KLqUdJvgXuwyVcnjTg/exec"; 

  const statusIndicator = document.getElementById('status-indicator');
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    statusIndicator.innerText = "브라우저 미지원";
  } else {
    const recognition = new SpeechRecognition();
    recognition.lang = 'ko-KR';
    recognition.continuous = true;
    recognition.interimResults = false;

    let isStarted = false; // 중복 실행 방지 플래그

    const startRecognition = () => {
      if (!isStarted) {
        try {
          recognition.start();
        } catch (e) {
          console.log("Recognition 이미 실행 중입니다.");
        }
      }
    };

    recognition.onstart = () => {
      isStarted = true;
      console.log("Voice recording started...");
      statusIndicator.innerText = "REC ●";
      statusIndicator.style.color = "red";
    };

    recognition.onresult = (event) => {
      const lastResult = event.results[event.results.length - 1];
      if (lastResult.isFinal) {
        const text = lastResult[0].transcript.trim();
        const timestamp = new Date().toLocaleString('ko-KR');

        if (text.length > 0) {
          console.log(`Archiving: [${timestamp}] ${text}`);
          
          fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors", 
            body: JSON.stringify({ timestamp, text }),
            headers: { "Content-Type": "application/json" }
          }).catch(err => console.error("GAS Sync Error:", err));
        }
      }
    };

    recognition.onend = () => {
      isStarted = false;
      console.log("Restarting recognition...");
      // 0.1초 뒤 재시작 (안정성 확보)
      setTimeout(() => { startRecognition(); }, 100);
    };

    recognition.onerror = (event) => {
      console.error("Recognition Error:", event.error);
      if (event.error === 'not-allowed') {
        statusIndicator.innerText = "마이크 권한 필요";
        isStarted = false;
      }
    };

    // 1. 페이지 로드 시 시도
    window.addEventListener('load', startRecognition);

    // 2. 브라우저 정책 대응 (사용자 클릭 시 강제 재시작)
    document.body.addEventListener('click', () => {
      startRecognition();
    }, { once: true });
  }
</script>
